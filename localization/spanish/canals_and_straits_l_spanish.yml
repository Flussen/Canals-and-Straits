l_spanish:
 zw_decision_pruchase_port_said_for_suez_canal: "Comprar Port Said para el Canal de Suez"
 zw_decision_pruchase_port_said_for_suez_canal_desc: "Llevar Port Said bajo tu control para asegurar una autoridad unificada sobre el corredor del Canal de Suez."
 cs_decision_purchase_colon_for_panama_canal: "Comprar Colon para el Canal de Panama"
 cs_decision_purchase_colon_for_panama_canal_desc: "Comprar el puerto clave del lado caribeno necesario para controlar el futuro cruce panameno."
 cs_decision_purchase_kiel_city_for_kiel_canal: "Comprar Kiel para el Canal de Kiel"
 cs_decision_purchase_kiel_city_for_kiel_canal_desc: "Adquirir Kiel para consolidar el control politico y estrategico sobre la zona del canal."
 cs_noti_purchase_colon_for_panama_canal: "Adquisicion de tierras del Canal de Panama"
 cs_noti_purchase_kiel_city_for_kiel_canal: "Adquisicion de tierras del Canal de Kiel"
 pmg_ownership_building_canal: "Propiedad del Canal"
 pmg_canal_tolls: "Operacion del Canal"
 pm_privately_owned_canal: "Canal de Propiedad Privada"
 pm_privately_owned_canal_desc: "El canal opera como una corporacion comercial. Capitalistas y personal tecnico gestionan sus operaciones mientras los beneficios fluyen a la propiedad privada."
 pm_government_run_canal: "Canal Administrado por el Estado"
 pm_government_run_canal_desc: "El canal es administrado directamente por el Estado. Burocratas e ingenieros gestionan la operacion a un coste burocratico considerable."
 pm_free_transit: "Libre Transito"
 pm_free_transit_desc: "El canal permanece abierto a toda la navegacion. No genera ingresos directos por peajes, pero mejora el prestigio y la eficiencia comercial del estado del canal."
	pm_standard_tolls: "Peajes Moderados"
	pm_standard_tolls_desc: "Todo el trafico paga un peaje moderado. Es la opcion comercial equilibrada: ingresos estables, papeleo manejable y control rutinario del paso."
	pm_tolls_except_allies: "Peajes Excepto Aliados y Bloque"
	pm_tolls_except_allies_desc: "Los subditos y socios del bloque reciben trato preferente, mientras el resto debe pagar. Es rentable, pero dificil de gestionar."
	pm_toll_collection: "Peajes de Maximos Ingresos"
	pm_toll_collection_desc: "La autoridad del canal exprime al maximo los ingresos de todo el trafico. Los ingresos aumentan aun mas, pero tambien el papeleo, la supervision y los costes de control."
	pm_total_blockade: "Bloqueo Total"
 pm_total_blockade_desc: "El canal se cierra al paso extranjero. Los ingresos se hunden, suben los costes de patrulla naval, terceros sufren fuertes penalizaciones de paso y al imponer el bloqueo se anaden 15 puntos de Infamia mientras empeoran las relaciones con grandes potencias y actores regionales."
 canal_kiel: "Canal de Kiel"
 building_kiel_canal: "Canal de Kiel"
 je_cs_bosphorus_control: "Controlar el Bosforo"
 je_cs_bosphorus_control_reason: "El dominio del Bosforo te permite decidir si la ruta maritima permanece abierta, gravada o restringida por motivos estrategicos."
 je_cs_suez_control: "Gestionar el Canal de Suez"
 je_cs_suez_control_reason: "El Canal de Suez puede usarse como arteria comercial abierta, fuente de peajes o puerta estrategica contra potencias hostiles."
 je_cs_panama_control: "Gestionar el Canal de Panama"
 je_cs_panama_control_reason: "Panama te permite moldear el paso transoceanico, favorecer a tu propio bloque y presionar a la navegacion enemiga."
 je_cs_kiel_survey: "Estudiar el Canal de Kiel"
 je_cs_kiel_survey_reason: "Un canal moderno en Schleswig-Holstein permitiria a tu pais remodelar el trafico entre el Baltico y el Mar del Norte."
 je_cs_kiel_survey_goal: "Progreso del estudio"
 je_cs_gibraltar_control: "Controlar el Estrecho de Gibraltar"
 je_cs_gibraltar_control_reason: "El control de ambas orillas en Gibraltar te permite imponer reglas de paso sobre el trafico entre el Atlantico y el Mediterraneo."
 je_cs_malacca_control: "Controlar el Estrecho de Malaca"
 je_cs_malacca_control_reason: "El dominio de Malaca te da influencia sobre uno de los corredores maritimos mas transitados del mundo."
 je_cs_hormuz_control: "Controlar el Estrecho de Ormuz"
 je_cs_hormuz_control_reason: "Ormuz es un punto de estrangulamiento regional; la potencia local puede convertir su control en ingresos y presion estrategica."
 je_cs_kiel_control: "Gestionar el Canal de Kiel"
 je_cs_kiel_control_reason: "Kiel puede mantenerse abierto al comercio, monetizarse mediante peajes o cerrarse como paso militar bajo tu control."
