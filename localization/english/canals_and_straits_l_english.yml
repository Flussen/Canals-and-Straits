l_english:
 zw_decision_pruchase_port_said_for_suez_canal: "Purchase Port Said for the Suez Canal"
 zw_decision_pruchase_port_said_for_suez_canal_desc: "Bring Port Said under your control to secure unified authority over the Suez Canal corridor."
 cs_decision_purchase_colon_for_panama_canal: "Purchase Colon for the Panama Canal"
 cs_decision_purchase_colon_for_panama_canal_desc: "Buy the key Caribbean-side port needed to control the future Panama crossing."
 cs_decision_purchase_kiel_city_for_kiel_canal: "Purchase Kiel for the Kiel Canal"
 cs_decision_purchase_kiel_city_for_kiel_canal_desc: "Acquire Kiel itself to consolidate political and strategic control over the canal zone."
 cs_noti_purchase_colon_for_panama_canal: "Panama Canal land acquisition"
 cs_noti_purchase_kiel_city_for_kiel_canal: "Kiel Canal land acquisition"
 pmg_ownership_building_canal: "Canal Ownership"
 pmg_canal_tolls: "Canal Operation"
 pm_privately_owned_canal: "Privately Owned Canal"
 pm_privately_owned_canal_desc: "The canal is run as a commercial corporation. Capitalists and technical staff manage operations while profits flow to private ownership."
 pm_government_run_canal: "Government Run Canal"
 pm_government_run_canal_desc: "The canal is administered directly by the state. Bureaucrats and engineers manage operations at a substantial bureaucratic cost."
 pm_free_transit: "Free Transit"
 pm_free_transit_desc: "The canal remains open to all shipping. It generates no direct toll income, but improves prestige and commercial efficiency in the canal state."
	pm_standard_tolls: "Moderate Tolls"
	pm_standard_tolls_desc: "All traffic pays a moderate toll. This is the balanced commercial option: steady revenue, manageable paperwork, and routine traffic control."
	pm_tolls_except_allies: "Tolls Except Allies and Bloc"
	pm_tolls_except_allies_desc: "Subjects and power bloc partners receive preferential treatment, while all others must pay. This is profitable but difficult to manage."
	pm_toll_collection: "Maximum Revenue Tolls"
	pm_toll_collection_desc: "The canal authority squeezes as much revenue as possible from all traffic. Income rises further, but paperwork, oversight, and shipping control costs also increase."
	pm_total_blockade: "Total Blockade"
 pm_total_blockade_desc: "The canal is closed to foreign passage. Revenue collapses, naval enforcement costs rise, third countries suffer major transit penalties, and imposing the blockade adds 15 Infamy while damaging relations with great powers and regional stakeholders."
 canal_kiel: "Kiel Canal"
 building_kiel_canal: "Kiel Canal"
 je_cs_bosphorus_control: "Control the Bosphorus"
 je_cs_bosphorus_control_reason: "Command of the Bosphorus lets you decide whether the sea lane remains open, taxed, or strategically constrained."
 je_cs_kiel_survey: "Survey the Kiel Canal"
 je_cs_kiel_survey_reason: "A modern canal through Schleswig-Holstein would let your state reshape Baltic and North Sea traffic."
 je_cs_kiel_survey_goal: "Survey progress"
 je_cs_gibraltar_control: "Control the Strait of Gibraltar"
 je_cs_gibraltar_control_reason: "Control of both shores around Gibraltar lets you impose passage rules on Atlantic-Mediterranean traffic."
 je_cs_malacca_control: "Control the Strait of Malacca"
 je_cs_malacca_control_reason: "Dominance over Malacca gives you leverage over one of the busiest maritime corridors on earth."
 je_cs_hormuz_control: "Control the Strait of Hormuz"
 je_cs_hormuz_control_reason: "Hormuz is a regional choke point; the local hegemon can turn control into revenue and strategic pressure."
  je_cs_kiel_control: "Manage the Kiel Canal"
  je_cs_kiel_control_reason: "Kiel can be kept open for trade, monetized through tolls, or tightened into a military passage under your control."
  cs_decision_suez_policy_free: "Suez: Free Transit"
 cs_decision_suez_policy_free_desc: "Keep Suez broadly open. This minimizes diplomatic friction but reduces canal revenue."
 cs_kiel_survey_decision: "Survey the Kiel Canal"
 cs_kiel_survey_decision_desc: "Commission engineering and administrative preparations for a canal across Schleswig-Holstein."
 cs_decision_suez_policy_allied_tolls: "Suez: Allied Toll Regime"
 cs_decision_suez_policy_allied_tolls_desc: "Grant preferred access to subjects and bloc partners while charging neutral traffic."
 cs_decision_suez_policy_strict: "Suez: Strict Access Control"
 cs_decision_suez_policy_strict_desc: "Turn Suez into a strategic instrument. Hostile powers face severe restrictions in wartime."
 cs_decision_panama_policy_free: "Panama: Free Transit"
 cs_decision_panama_policy_free_desc: "Allow broad use of the Panama Canal with minimal discrimination between foreign powers."
 cs_decision_panama_policy_allied_tolls: "Panama: Allied Toll Regime"
 cs_decision_panama_policy_allied_tolls_desc: "Prefer subjects and power bloc partners while still extracting revenue from foreign traffic."
 cs_decision_panama_policy_strict: "Panama: Strict Access Control"
 cs_decision_panama_policy_strict_desc: "Use Panama as a military-economic choke point and punish hostile maritime access."
 cs_decision_kiel_policy_free: "Kiel: Free Transit"
 cs_decision_kiel_policy_free_desc: "Maintain open movement through Kiel and avoid escalating tensions in the Baltic approach."
 cs_decision_kiel_policy_allied_tolls: "Kiel: Allied Toll Regime"
 cs_decision_kiel_policy_allied_tolls_desc: "Offer favorable treatment to your political partners while taxing outside users."
 cs_decision_kiel_policy_strict: "Kiel: Strict Access Control"
 cs_decision_kiel_policy_strict_desc: "Exploit Kiel as a strategic naval gate and restrict wartime enemies."
